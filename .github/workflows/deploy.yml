name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install pnpm before Node caching (version comes from packageManager in package.json)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Then set up Node + pnpm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # Install deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build every toy into dist/ (home -> dist root, others -> dist/<name>)
      - name: Build
        run: pnpm build

      # Deploy to GitHub Pages (only on push to main, not on PRs)
      - name: Deploy to GH Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
